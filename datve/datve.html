<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt vé xem phim KOF</title>
    <link rel="stylesheet" href="datve.css" />
  </head>
  <body>
    <div id="date-list-container" class="date-container"></div>
    <div id="cinema-selection" class="cinema-selection">
      <p style="text-align: center; color: #888">
        Vui lòng chọn Tỉnh/Thành phố để xem rạp
      </p>
    </div>
    <div id="city-container" class="city-container"></div>

    <div id="seat-selection" class="screen-container" style="display: none">
      <div class="screen-header">SCREEN</div>

      <div id="seat-map" class="seat-map"></div>

      <div class="seat-legend">
        <div class="legend-item"><span class="box regular"></span> Thường</div>
        <div class="legend-item"><span class="box vip"></span> VIP</div>
        <div class="legend-item"><span class="box checked"></span> Checked</div>
      </div>
    </div>
    <div id="combo-selection" class="screen-container" style="display: none">
      <h2 style="text-align: center; margin: 20px">CHỌN BẮP NƯỚC</h2>

      <div class="combo-list">
        <class class="combo-item">
          <img src="popcorn.png" alt="Bắp" width="100" />
          <div class="combo-info">
            <h3>Bắp Ngọt Lớn</h3>
            <p>Giá: 60.000 đ</p>
            <div class="quantity-control">
              <button onclick="changeQty('popcorn', -1)">-</button>
              <span id="qty-popcorn">0</span>
              <button onclick="changeQty('popcorn', 1)">+</button>
            </div>
          </div>
        </class>

        <div class="combo-item">
          <img src="soda.png" alt="Nước" width="100" />
          <div class="combo-info">
            <h3>Nước Siêu Lớn</h3>
            <p>Giá: 35.000 đ</p>
            <div class="quantity-control">
              <button onclick="changeQty('soda', -1)">-</button>
              <span id="qty-soda">0</span>
              <button onclick="changeQty('soda', 1)">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
    </div>

    <div id="payment-selection" class="screen-container" style="display: none">
      <div class="payment-summary-box">
        <div class="summary-title">Tổng cộng</div>
        <div id="summary-details" class="summary-details"></div>
        <div class="summary-subtotal" id="summary-subtotal">0 đ</div>

        <div class="summary-title">Khuyến mãi</div>
        <div class="summary-subtotal">0 đ</div>

        <div class="summary-total-title">Tổng số tiền thanh toán</div>
        <div class="summary-final-total" id="summary-final">0 đ</div>
      </div>

      <div class="payment-methods-box">
        <div class="method-title">HÌNH THỨC THANH TOÁN</div>
        <div class="method-list">
          <label class="method-item">
            <input type="radio" name="payment-method" checked />
            <span>ATM card (Thẻ nội địa)</span>
          </label>
          <label class="method-item">
            <input type="radio" name="payment-method" />
            <span>Thẻ quốc tế (Visa, Master, Amex, JCB)</span>
          </label>
          <label class="method-item">
            <input type="radio" name="payment-method" />
            <span>MoMo</span>
          </label>
          <label class="method-item">
            <input type="radio" name="payment-method" />
            <span>ZaloPay</span>
          </label>
        </div>
      </div>
    </div>

    <div class="booking-footer">
      <button class="btn-prev" onclick="backToCinema()">PREVIOUS</button>
      <div class="info">
        <p id="movie-name-display">Rạp: Chưa chọn</p>

        <p id="showtime-info">Suất chiếu: --:--</p>

        <p id="seat-info">Ghế: Chưa chọn</p>
      </div>
      <div class="total-price">Tổng: <span id="price-amount">0</span> đ</div>
      <button class="btn-next">NEXT</button>
    </div>
    <script src="datve.js"></script>
  </body>
</html>
