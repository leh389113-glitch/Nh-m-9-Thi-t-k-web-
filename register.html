<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="login-register.css">
</head>
<body>
    <div class="main-container">
        <div class="form-section">
            <h1>ĐĂNG KÝ</h1>
            <form>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập địa chỉ Email của bạn" id="registerEmail">
                </div>

                <div class="input-group">
                    <label>Tên người dùng</label>
                    <input type="text" placeholder="Nhập tên người dùng của bạn" id="registerUsername">
                </div>

                <div class="input-group">
                    <label>Mật Khẩu</label>
                    <input type="password" placeholder="Nhập Mật Khẩu của bạn" id="registerPassword">
                </div>

                <div class="input-group">
                    <label>Xác nhận Mật khẩu</label>
                    <input type="password" placeholder="Xác nhận lại Mật Khẩu của bạn" id="registerConfirmPassword">
                </div>

                <button type="button" class="btn-submit" id="register" onclick="registerUser()">Đăng Ký</button>
            </form>
        </div>
    </div>
    <script src="login-register.js"></script>
</body>
</html>
